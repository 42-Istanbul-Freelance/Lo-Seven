services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - backend-uploads:/app/uploads
      - backend-data:/app/data
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/pearlconnect.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=pearlconnect-secret-key-2024
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-uploads:
  backend-data:
